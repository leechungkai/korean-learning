<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>한국어 학습기 (Naver Link)</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding-bottom: 100px;
        }

        /* 導覽列 */
        .tabs {
            display: flex;
            background: var(--primary);
            position: sticky;
            top: 0;
            z-index: 1000;
            overflow-x: auto;
        }

        .tab-btn {
            flex: 1;
            padding: 15px 5px;
            border: none;
            background: none;
            font-size: 13px;
            font-weight: bold;
            color: #bdc3c7;
            white-space: nowrap;
            cursor: pointer;
        }

        .tab-btn.active { color: #fff; border-bottom: 4px solid var(--accent); }

        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        .page { display: none; }
        .page.active { display: block; }

        .card {
            background: #fff; padding: 20px; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px;
        }

        input, textarea {
            width: 100%; padding: 12px; border: 1px solid #ddd;
            border-radius: 10px; font-size: 16px; box-sizing: border-box;
            margin-bottom: 10px; outline: none;
        }

        .btn { border: none; border-radius: 10px; font-weight: bold; cursor: pointer; padding: 12px 15px; transition: 0.2s; }
        .main-btn { width: 100%; background: var(--accent); color: white; }

        /* 閱讀區單字樣式 */
        .reading-content {
            font-size: 20px; line-height: 2.2; text-align: left;
            background: #fff; padding: 20px; border-radius: 12px;
            border: 1px solid #eee; margin-bottom: 15px;
        }

        .word-link {
            display: inline-block; cursor: pointer; padding: 0 2px;
            border-radius: 4px; color: var(--primary); font-weight: 500;
        }
        .word-link:hover { background-color: #dff9fb; color: #2980b9; text-decoration: underline; }

        /* 單字清單 */
        .vocab-list { list-style: none; padding: 0; }
        .vocab-item {
            background: #fff; margin-bottom: 8px; padding: 15px;
            border-radius: 12px; display: flex; justify-content: space-between; align-items: center;
            border-left: 5px solid var(--accent);
        }

        /* 懸浮按鈕 */
        .scroll-nav { position: fixed; right: 15px; bottom: 100px; display: flex; flex-direction: column; gap: 10px; z-index: 2000; }
        .scroll-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--primary); color: white; border: none; font-size: 18px; display: flex; align-items: center; justify-content: center; opacity: 0.8; }

        .chat-bubble { background: #f1f2f6; padding: 15px; border-radius: 15px; margin-bottom: 15px; font-size: 16px; }
    </style>
</head>
<body>

    <div class="scroll-nav">
        <button class="scroll-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">▲</button>
        <button class="scroll-btn" onclick="window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'})">▼</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showPage('vocab-page')">단어장<br>(單字)</button>
        <button class="tab-btn" onclick="showPage('read-page')">읽기 연습<br>(閱讀)</button>
        <button class="tab-btn" onclick="showPage('quiz-page')">도전 모드<br>(挑戰)</button>
        <button class="tab-btn" onclick="showPage('ai-page')">AI 대화<br>(對話)</button>
    </div>

    <div class="container">
        
        <div id="vocab-page" class="page active">
            <div class="card">
                <input type="text" id="krInput" placeholder="한국어">
                <input type="text" id="chInput" placeholder="뜻">
                <button class="btn main-btn" onclick="addVocab()">추가 (新增)</button>
            </div>
            <input type="text" id="searchInput" placeholder="🔍 검색..." style="border: 2px solid var(--accent);" oninput="renderList()">
            <ul class="vocab-list" id="vocabList"></ul>
        </div>

        <div id="read-page" class="page">
            <div class="card">
                <textarea id="readInput" placeholder="在此貼上韓文文章..."></textarea>
                <button class="btn main-btn" style="background: #8e44ad;" onclick="updateReadContent()">저장 (儲存內容)</button>
            </div>
            <div class="card">
                <p style="font-size:12px; color:gray; margin-bottom:10px;">💡 提示：點擊單字直接開啟 Naver 韓中字典</p>
                <div id="displayArea" class="reading-content">내용을 입력하세요.</div>
                <div style="display:flex; gap:10px;">
                    <button class="btn" style="flex:2; background:var(--success); color:white" onclick="speak(getRawText())">🔊 읽기 (朗讀)</button>
                    <button class="btn" style="flex:1; background:var(--danger); color:white" onclick="window.speechSynthesis.cancel()">🛑🛑</button>
                </div>
            </div>
        </div>

        <div id="quiz-page" class="page">
            <div class="card">
                <h3>🎧 랜덤 리스닝</h3>
                <button class="btn" style="background:var(--warning); color:white; width:100%" onclick="nextQuiz()">새 문제</button>
                <div id="quizBox" style="display:none; margin-top:20px;">
                    <button class="btn" style="background:var(--success); color:white" onclick="playQuizSound()">🔊 듣기</button>
                    <div id="quizWord" style="font-size:28px; font-weight:bold; margin:20px 0; visibility:hidden;">? ? ?</div>
                    <button class="btn" style="background:#bdc3c7" onclick="document.getElementById('quizWord').style.visibility='visible'">정답</button>
                </div>
            </div>
        </div>

        <div id="ai-page" class="page">
            <div class="card">
                <h3>🤖 AI 대화방</h3>
                <input type="password" id="apiKey" placeholder="在此輸入 API Key">
                <div id="aiChat" class="chat-bubble">안녕하세요! 오늘 기분이 어때요?</div>
                <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                    <input type="text" id="aiTextInput" placeholder="打字練習..." style="margin-bottom:0">
                    <button class="btn" style="background:var(--accent); color:white" onclick="sendTextToAI()">전송</button>
                </div>
                <button id="aiMicBtn" style="width:60px; height:60px; border-radius:50%; border:none; background:var(--danger); color:white; font-size:24px;" onclick="startAIConversation()">🎤</button>
                <div id="aiUserText" style="font-style:italic; color:var(--accent); min-height:24px; margin-top:10px;"></div>
            </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:30px;">
            <button class="btn" style="background:#95a5a6; color:white; font-size:12px" onclick="exportData()">📤 백업</button>
            <button class="btn" style="background:#95a5a6; color:white; font-size:12px" onclick="importData()">📥 가져오기</button>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'myKoreanApp_v2';
        let currentQuiz = null;

        document.addEventListener('DOMContentLoaded', () => {
            renderList();
            const savedText = localStorage.getItem('readingText') || "내용을 입력하세요.";
            processReadingText(savedText);
        });

        // --- 🔗 跳轉 Naver 字典功能 ---
        function openNaver(word) {
            const cleanWord = word.replace(/[.,!?;:()"'“”]/g, "").trim();
            if (cleanWord) {
                // 使用 Naver 韓中字典的行動版搜尋網址，最穩定
                const url = `https://zh.dict.naver.com/#/search?query=${encodeURIComponent(cleanWord)}`;
                window.open(url, '_blank');
            }
        }

        // --- 📖 處理閱讀文本 ---
        function processReadingText(text) {
            const area = document.getElementById('displayArea');
            area.innerHTML = '';
            text.split(/(\s+)/).forEach(word => {
                if (word.trim().length > 0) {
                    const span = document.createElement('span');
                    span.className = 'word-link';
                    span.innerText = word;
                    span.onclick = () => openNaver(word);
                    area.appendChild(span);
                } else {
                    area.appendChild(document.createTextNode(word));
                }
            });
        }

        function updateReadContent() {
            const t = document.getElementById('readInput').value.trim();
            if(t) { localStorage.setItem('readingText', t); processReadingText(t); document.getElementById('readInput').value = ''; alert("儲存成功！"); }
        }

        // --- 其他核心功能 ---
        function speak(text) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang = 'ko-KR'; window.speechSynthesis.speak(u); }
        function getRawText() { return localStorage.getItem('readingText') || ""; }
        function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.add('active'); event.currentTarget.classList.add('active'); }
        function addVocab() { const kr = document.getElementById('krInput'), ch = document.getElementById('chInput'); if(!kr.value || !ch.value) return; const v = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); v.unshift({ kr: kr.value.trim(), ch: ch.value.trim() }); localStorage.setItem(STORAGE_KEY, JSON.stringify(v)); renderList(); kr.value = ''; ch.value = ''; }
        function renderList() { 
            const list = document.getElementById('vocabList'); const v = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); list.innerHTML = '';
            v.forEach((item, i) => {
                const li = document.createElement('li'); li.className = 'vocab-item';
                li.innerHTML = `<div><div class="kr-text" style="cursor:pointer" onclick="openNaver('${item.kr}')">${item.kr}</div><div>${item.ch}</div></div>
                <div><button class="btn" style="background:var(--success);color:white;margin-right:5px" onclick="speak('${item.kr}')">🔊</button>
                <button class="btn" style="background:var(--danger);color:white" onclick="deleteVocab(${i})">🗑️</button></div>`;
                list.appendChild(li);
            });
        }
        function deleteVocab(i) { if(confirm("確定刪除嗎?")) { const v = JSON.parse(localStorage.getItem(STORAGE_KEY)); v.splice(i,1); localStorage.setItem(STORAGE_KEY, JSON.stringify(v)); renderList(); } }
        async function callGemini(key, text) { const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`; const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: "너는 친절한 한국어 선생님이야. 한국어로 대답하고 끝에 중국어 번역을 붙여줘: " + text }] }] }) }); const data = await res.json(); return data.candidates[0].content.parts[0].text; }
        async function sendTextToAI() { const k = document.getElementById('apiKey').value; const t = document.getElementById('aiTextInput').value; if(!k || !t) return; const r = await callGemini(k, t); document.getElementById('aiChat').innerText = r; speak(r); }
        function nextQuiz() { const v = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); if(!v.length) return; currentQuiz = v[Math.floor(Math.random()*v.length)]; document.getElementById('quizBox').style.display = 'block'; document.getElementById('quizWord').style.visibility = 'hidden'; document.getElementById('quizWord').innerText = currentQuiz.kr; speak(currentQuiz.kr); }
        function playQuizSound() { if(currentQuiz) speak(currentQuiz.kr); }
        function exportData() { prompt("備份代碼:", localStorage.getItem(STORAGE_KEY)); }
        function importData() { const c = prompt("貼上備份代碼:"); if(c){localStorage.setItem(STORAGE_KEY, c); renderList(); alert("匯入成功！");} }
        function startAIConversation() { alert("GitHub HTTPS 環境才能用麥克風喔！"); }
    </script>
</body>
</html>
